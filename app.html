<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace Series — 管理者ダッシュボード</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Hiragino Sans', 'Noto Sans JP', -apple-system, sans-serif;
    background: #0f0720;
    color: #fff;
    min-height: 100vh;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .back { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 13px; }
  .app-title { font-size: 15px; font-weight: 700; }
  .main { max-width: 720px; margin: 0 auto; padding: 20px 16px 60px; }

  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab-btn {
    flex: 1;
    padding: 10px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.6);
    border: none;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
  }
  .tab-btn.active {
    background: linear-gradient(135deg,#3d1a5e,#6b2d8b);
    color: #fff;
    font-weight: 700;
  }
  .badge {
    background: rgba(255,255,255,0.2);
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    margin-left: 4px;
  }

  .empty, .loading, .err {
    text-align: center;
    color: rgba(255,255,255,0.4);
    padding: 40px 20px;
    font-size: 13px;
  }
  .err { color: #f87171; }

  .item-card {
    background: rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .item-tag {
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .item-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .item-meta { font-size: 11px; color: rgba(255,255,255,0.45); margin-bottom: 8px; }
  .item-desc {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 8px;
  }
  .actions { display: flex; gap: 8px; margin-top: 10px; }
  .btn { flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-approve { background: linear-gradient(135deg,#15803d,#16a34a); color: #fff; }
  .btn-reject { background: rgba(220,38,38,0.3); color: #fca5a5; border: 1px solid rgba(220,38,38,0.4); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,10,35,0.95);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <a class="back" href="index.html">‹ 一覧へ</a>
  <div class="app-title" id="app-title">—</div>
  <div style="width:48px;"></div>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab-btn active" id="tab-pending" onclick="switchTab('pending')">
      承認待ち<span class="badge" id="pending-badge"></span>
    </button>
    <button class="tab-btn" id="tab-evals" onclick="switchTab('evals')">
      評価承認<span class="badge" id="evals-badge"></span>
    </button>
  </div>
  <div class="tabs" style="margin-bottom:20px;">
    <button class="tab-btn" id="tab-notices" onclick="switchTab('notices')">お知らせ</button>
    <button class="tab-btn" id="tab-spots" onclick="switchTab('spots')">スポット管理</button>
    <button class="tab-btn" id="tab-admins" onclick="switchTab('admins')">管理者</button>
    <button class="tab-btn" id="tab-devmode" onclick="switchTab('devmode')">開発者</button>
  </div>

  <div id="panel-pending"><div class="loading">読み込み中...</div></div>
  <div id="panel-evals" style="display:none;"><div class="loading">読み込み中...</div></div>
  <div id="panel-notices" style="display:none;"></div>
  <div id="panel-spots" style="display:none;"><div class="loading">読み込み中...</div></div>
  <div id="panel-admins" style="display:none;"><div class="loading">読み込み中...</div></div>
  <div id="panel-devmode" style="display:none;"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const appId = params.get('id');
  const appConfig = getAppConfig(appId);

  const authClient = supabase.createClient(AUTH_URL, AUTH_ANON_KEY);

  let APP_URL = '';
  let APP_KEY = '';
  let appClient = null;
  let currentAdminUserId = null;
  let currentAdminUsername = null;

  // onclick="..." 属性の中に安全に埋め込むためのJS文字列リテラル生成
  // （JSON.stringifyはダブルクォートを使うためonclick="..."属性が壊れる。シングルクォートで安全に埋め込む）
  function jsq(v) {
    return "'" + String(v).replace(/\\/g, '\\\\').replace(/'/g, "\\'") + "'";
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2200);
  }

  function switchTab(tab) {
    ['pending', 'evals', 'notices', 'spots', 'admins', 'devmode'].forEach(function(t) {
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
      document.getElementById('panel-' + t).style.display = t === tab ? 'block' : 'none';
    });
    if (tab === 'evals') loadPendingEvaluations();
    if (tab === 'notices') loadAdminNotices();
    if (tab === 'spots') loadAdminSpots();
    if (tab === 'admins') loadAdminList();
    if (tab === 'devmode') loadDevSettingsPanel();
  }

  // ── 認証・権限チェック ──
  async function init() {
    if (!appConfig) {
      document.body.innerHTML = '<div class="loading">不明なアプリです。<a class="back" href="index.html">一覧へ戻る</a></div>';
      return;
    }
    document.getElementById('app-title').textContent = appConfig.name;
    APP_URL = appConfig.supabase_url;
    APP_KEY = appConfig.supabase_anon_key;
    // アプリのSupabaseプロジェクトが認証用プロジェクトと同じ場合、ログインセッションをそのまま使う
    // （別プロジェクトの場合は現状セッションを共有できないため、モデレーター管理など一部機能は super_admin/このアプリでのみ動作）
    appClient = (APP_URL === AUTH_URL) ? authClient : supabase.createClient(APP_URL, APP_KEY);

    const { data } = await authClient.auth.getSession();
    if (!data || !data.session) {
      location.href = 'index.html';
      return;
    }
    const { data: adminRow, error } = await authClient
      .from('admins')
      .select('username, role')
      .eq('user_id', data.session.user.id)
      .maybeSingle();
    if (error || !adminRow) {
      location.href = 'index.html';
      return;
    }
    currentAdminUserId = data.session.user.id;
    currentAdminUsername = adminRow.username;

    loadPendingSubmissions();
  }

  // ── モデレーター操作ログ（誰が・いつ・どのアプリで・何をしたか） ──
  // 認証用プロジェクト（AUTH_URL）側の admin_action_log テーブルに記録する。
  // どのアプリのデータを操作した場合でも、ログ自体は常にここに集約する。
  async function logAdminAction(action, targetId, targetLabel) {
    try {
      await authClient.from('admin_action_log').insert({
        actor_user_id: currentAdminUserId,
        actor_username: currentAdminUsername,
        action: action,
        target_id: targetId ? String(targetId) : null,
        target_label: targetLabel || null,
        app_id: appId,
      });
    } catch (e) { console.warn('logAdminAction error:', e); }
  }

  // ── 承認待ち（投稿） ──
  async function loadPendingSubmissions() {
    const panel = document.getElementById('panel-pending');
    panel.innerHTML = '<div class="loading">読み込み中...</div>';
    try {
      const res = await fetch(`${APP_URL}/rest/v1/submissions?status=eq.pending&order=created_at.desc`, {
        headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}` }
      });
      const data = await res.json();
      if (!Array.isArray(data)) {
        panel.innerHTML = '<div class="err">読み込みエラー</div>';
        return;
      }
      document.getElementById('pending-badge').textContent = data.length || '';
      if (!data.length) {
        panel.innerHTML = '<div class="empty">承認待ちの投稿はありません</div>';
        return;
      }
      const gMapUrl = function(lat, lng) { return 'https://www.google.com/maps?q=' + lat + ',' + lng; };

      panel.innerHTML = data.map(function(s) {
        if (s.type === 'wrong_report') {
          return '<div class="item-card" style="border-color:rgba(239,68,68,0.35);background:rgba(239,68,68,0.1);">'
            + '<div class="item-tag" style="color:#dc2626;">🛡️ 誤情報報告</div>'
            + '<div class="item-title">' + escHtml(s.spot_name) + '</div>'
            + '<div class="item-desc">' + escHtml(s.description || '(内容未記入)') + '</div>'
            + '<div class="item-meta">報告者: ' + escHtml(s.submitter || '匿名') + '</div>'
            + '<div class="actions">'
            + '<button class="btn btn-approve" onclick="approveWrongReport(' + jsq(s.id) + ')">✅ 確定</button>'
            + '<button class="btn btn-reject" onclick="rejectSubmission(' + jsq(s.id) + ')">❌ 却下</button>'
            + '</div></div>';
        }
        if (s.type === 'location_correction') {
          return '<div class="item-card" style="border-color:rgba(201,168,76,0.35);background:rgba(201,168,76,0.1);">'
            + '<div class="item-tag" style="color:#c9a84c;">📍 位置修正リクエスト</div>'
            + '<div class="item-title">' + escHtml(s.target_spot_name || s.spot_name) + '</div>'
            + '<div class="item-meta">報告座標: ' + s.lat.toFixed(4) + ', ' + s.lng.toFixed(4) + '　<a href="' + gMapUrl(s.lat, s.lng) + '" target="_blank" style="color:#c9a84c;">🗺️ 確認</a></div>'
            + '<div class="actions">'
            + '<button class="btn btn-approve" onclick="approveLocationCorrection(' + jsq(s.id) + ')">✅ 位置を更新</button>'
            + '<button class="btn btn-reject" onclick="rejectSubmission(' + jsq(s.id) + ')">❌ 却下</button>'
            + '</div></div>';
        }
        return '<div class="item-card">'
          + '<div class="item-title">' + escHtml(s.spot_name) + (s.location_confirmed === false ? ' <span style="font-size:10px;background:rgba(245,158,11,0.25);color:#fbbf24;border-radius:8px;padding:2px 8px;">⚠️ 位置未確認</span>' : '') + '</div>'
          + '<div class="item-meta">' + escHtml(s.category || '') + ' · ' + escHtml(s.member || '') + ' · ' + escHtml(s.submitter || '') + '</div>'
          + (s.image_url ? '<img src="' + s.image_url + '" style="width:100%;max-width:200px;border-radius:10px;margin-bottom:8px;display:block;">' : '')
          + (s.description ? '<div class="item-desc">' + escHtml(s.description) + '</div>' : '')
          + '<div class="actions">'
          + '<button class="btn btn-approve" onclick="approveNewSpot(' + jsq(s.id) + ')">✅ 承認</button>'
          + '<button class="btn btn-reject" onclick="rejectSubmission(' + jsq(s.id) + ')">❌ 却下</button>'
          + '</div></div>';
      }).join('');
    } catch (e) {
      console.warn('loadPendingSubmissions error:', e);
      panel.innerHTML = '<div class="err">読み込みエラー</div>';
    }
  }

  async function awardPointsViaFetch(userId, amount) {
    if (!userId || !amount) return;
    try {
      const res = await fetch(`${APP_URL}/rest/v1/profiles?id=eq.${userId}&select=points`, {
        headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}` }
      });
      const rows = await res.json();
      const current = (rows && rows[0] && rows[0].points) || 0;
      await fetch(`${APP_URL}/rest/v1/profiles?id=eq.${userId}`, {
        method: 'PATCH',
        headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ points: current + amount })
      });
    } catch (e) { console.warn('awardPointsViaFetch error:', e); }
  }

  async function patchSubmission(id, body) {
    await fetch(`${APP_URL}/rest/v1/submissions?id=eq.${id}`, {
      method: 'PATCH',
      headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  }

  async function insertPointLog(body) {
    await fetch(`${APP_URL}/rest/v1/point_log`, {
      method: 'POST',
      headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(Object.assign({ created_at: new Date().toISOString() }, body))
    });
  }

  async function approveNewSpot(id) {
    const res = await fetch(`${APP_URL}/rest/v1/submissions?id=eq.${id}`, {
      headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}` }
    });
    const [s] = await res.json();
    if (!s) return;

    await fetch(`${APP_URL}/rest/v1/spots`, {
      method: 'POST',
      headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: s.spot_name, lat: s.lat, lng: s.lng, sub: s.description, icon: '📍',
        category: s.category, address: '', member: s.member, image_url: s.image_url || null,
        discoverer: s.submitter, trust_score: 5, good_count: 0, bad_count: 0, admin_level: 'pending_review',
      })
    });
    await patchSubmission(id, { status: 'approved' });

    if (s.submitter_id) {
      await insertPointLog({ user_id: s.submitter_id, category: '早期発見', amount: 50, spot_name: s.spot_name, status: 'confirmed' });
      await awardPointsViaFetch(s.submitter_id, 50);
      if (s.image_url) {
        await insertPointLog({ user_id: s.submitter_id, category: '元ネタ写真提供', amount: 30, spot_name: s.spot_name, status: 'confirmed' });
        await awardPointsViaFetch(s.submitter_id, 30);
      }
    }
    await loadPendingSubmissions();
    logAdminAction('approve_new_spot', id, s.spot_name);
    showToast('✅ 承認しました');
  }

  async function approveLocationCorrection(id) {
    const res = await fetch(`${APP_URL}/rest/v1/submissions?id=eq.${id}`, {
      headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}` }
    });
    const [s] = await res.json();
    if (!s) return;

    await fetch(`${APP_URL}/rest/v1/spots?name=eq.${encodeURIComponent(s.target_spot_name)}`, {
      method: 'PATCH',
      headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ lat: s.lat, lng: s.lng })
    });
    await patchSubmission(id, { status: 'approved' });

    if (s.submitter_id) {
      await insertPointLog({ user_id: s.submitter_id, category: 'wrong_info_confirmed', amount: 10, spot_name: s.spot_name, status: 'confirmed' });
      await awardPointsViaFetch(s.submitter_id, 10);
    }
    await loadPendingSubmissions();
    logAdminAction('approve_location_correction', id, s.target_spot_name || s.spot_name);
    showToast('✅ 位置を更新しました');
  }

  async function approveWrongReport(id) {
    const res = await fetch(`${APP_URL}/rest/v1/submissions?id=eq.${id}`, {
      headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}` }
    });
    const [s] = await res.json();
    if (!s) return;

    if (s.submitter_id) {
      await insertPointLog({ user_id: s.submitter_id, category: 'wrong_info_confirmed', amount: 10, spot_name: s.spot_name, status: 'confirmed' });
      await awardPointsViaFetch(s.submitter_id, 10);
    }
    await patchSubmission(id, { status: 'approved' });
    await loadPendingSubmissions();
    logAdminAction('approve_wrong_report', id, s.spot_name);
    showToast('✅ 確定しました');
  }

  async function rejectSubmission(id) {
    await patchSubmission(id, { status: 'rejected' });
    await loadPendingSubmissions();
    logAdminAction('reject_submission', id, null);
    showToast('❌ 却下しました');
  }

  // ── 評価承認（リモート確認・BAD評価） ──
  async function loadPendingEvaluations() {
    const panel = document.getElementById('panel-evals');
    panel.innerHTML = '<div class="loading">読み込み中...</div>';
    try {
      const res = await fetch(`${APP_URL}/rest/v1/point_log?status=eq.pending&order=created_at.asc&select=*`, {
        headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}` }
      });
      const rows = await res.json();
      document.getElementById('evals-badge').textContent = (rows || []).length || '';
      if (!rows || !rows.length) {
        panel.innerHTML = '<div class="empty">承認待ちの評価はありません</div>';
        return;
      }
      const uids = [...new Set(rows.map(function(r) { return r.user_id; }).filter(Boolean))];
      let nameMap = {};
      if (uids.length > 0) {
        const pRes = await fetch(`${APP_URL}/rest/v1/profiles?id=in.(${uids.join(',')})&select=id,display_name`, {
          headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}` }
        });
        const pRows = await pRes.json();
        (pRows || []).forEach(function(p) { nameMap[p.id] = p.display_name; });
      }
      panel.innerHTML = rows.map(function(r) {
        const dt = new Date(r.created_at).toLocaleDateString('ja-JP');
        const uname = nameMap[r.user_id] || '巡礼者';
        return '<div class="item-card">'
          + '<div class="item-title">' + escHtml(uname) + ' さん</div>'
          + '<div class="item-meta">📍 ' + escHtml(r.spot_name || '') + '</div>'
          + '<div class="item-meta">' + escHtml(r.category || '') + '　<span style="color:#4ade80;font-weight:700;">+' + r.amount + 'pt</span>　' + dt + '</div>'
          + '<div class="actions">'
          + '<button class="btn btn-approve" onclick="approveEvalPoint(' + jsq(r.id) + ',' + jsq(r.user_id) + ',' + r.amount + ')">✅ 承認</button>'
          + '<button class="btn btn-reject" onclick="rejectEvalPoint(' + jsq(r.id) + ')">❌ 却下</button>'
          + '</div></div>';
      }).join('');
    } catch (e) {
      console.warn('loadPendingEvaluations error:', e);
      panel.innerHTML = '<div class="err">読み込みエラー</div>';
    }
  }

  async function approveEvalPoint(id, userId, amount) {
    await fetch(`${APP_URL}/rest/v1/point_log?id=eq.${id}`, {
      method: 'PATCH',
      headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'confirmed' })
    });
    await awardPointsViaFetch(userId, amount);
    await loadPendingEvaluations();
    logAdminAction('approve_eval', id, null);
    showToast('✅ 承認してポイントを付与しました');
  }

  async function rejectEvalPoint(id) {
    await fetch(`${APP_URL}/rest/v1/point_log?id=eq.${id}`, {
      method: 'PATCH',
      headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'rejected' })
    });
    await loadPendingEvaluations();
    logAdminAction('reject_eval', id, null);
    showToast('❌ 却下しました');
  }

  // ── お知らせ ──
  async function loadAdminNotices() {
    const panel = document.getElementById('panel-notices');
    panel.innerHTML = '<div class="loading">読み込み中...</div>';
    try {
      const { data, error } = await appClient.from('notices').select('*').order('sort_order', { ascending: true });
      if (error) throw error;
      let html = '<div class="item-card">'
        + '<div style="font-size:13px;font-weight:700;margin-bottom:8px;">新しいお知らせ</div>'
        + '<input id="notice-title-input" placeholder="タイトル" style="width:100%;padding:10px;border-radius:8px;border:none;background:rgba(255,255,255,0.1);color:#fff;margin-bottom:8px;box-sizing:border-box;">'
        + '<textarea id="notice-body-input" placeholder="本文（任意）" style="width:100%;padding:10px;border-radius:8px;border:none;background:rgba(255,255,255,0.1);color:#fff;margin-bottom:8px;box-sizing:border-box;min-height:60px;"></textarea>'
        + '<button class="btn btn-approve" style="width:100%;" onclick="postNotice()">投稿する</button>'
        + '<div id="notice-post-msg" style="font-size:12px;color:#4ade80;margin-top:6px;"></div>'
        + '</div>';
      if (!data || !data.length) {
        html += '<div class="empty">投稿はありません</div>';
      } else {
        html += data.map(function(n, idx) {
          const bg = n.is_active ? '#4ade80' : 'rgba(255,255,255,0.15)';
          const col = n.is_active ? '#14532d' : 'rgba(255,255,255,0.6)';
          const label = n.is_active ? '公開中' : '非公開';
          const dt = new Date(n.created_at).toLocaleDateString('ja-JP');
          return '<div class="item-card">'
            + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">'
            + '<div class="item-title" style="margin-bottom:0;"><span style="color:rgba(255,255,255,0.4);font-size:11px;margin-right:6px;">' + (idx+1) + '.</span>' + escHtml(n.title) + '</div>'
            + '<div style="display:flex;gap:6px;flex-shrink:0;margin-left:8px;">'
            + '<button onclick="toggleNoticeActive(' + jsq(n.id) + ',' + n.is_active + ')" style="font-size:11px;padding:3px 8px;border-radius:6px;border:none;cursor:pointer;background:' + bg + ';color:' + col + ';">' + label + '</button>'
            + '<button onclick="moveNotice(' + jsq(n.id) + ',' + (n.sort_order || 0) + ',-1)" style="font-size:11px;padding:3px 8px;border-radius:6px;border:none;cursor:pointer;background:rgba(255,255,255,0.15);color:#fff;">↑</button>'
            + '<button onclick="moveNotice(' + jsq(n.id) + ',' + (n.sort_order || 0) + ',1)" style="font-size:11px;padding:3px 8px;border-radius:6px;border:none;cursor:pointer;background:rgba(255,255,255,0.15);color:#fff;">↓</button>'
            + '<button onclick="deleteNotice(' + jsq(n.id) + ')" style="font-size:11px;padding:3px 8px;border-radius:6px;border:none;cursor:pointer;background:#f87171;color:#fff;">削除</button>'
            + '</div></div>'
            + (n.body ? '<div class="item-meta">' + escHtml(n.body) + '</div>' : '')
            + '<div style="font-size:11px;color:rgba(255,255,255,0.3);">' + dt + '</div>'
            + '</div>';
        }).join('');
      }
      panel.innerHTML = html;
    } catch (e) {
      console.warn('loadAdminNotices error:', e);
      panel.innerHTML = '<div class="err">読み込みエラー（権限がない可能性があります）</div>';
    }
  }

  async function postNotice() {
    const title = (document.getElementById('notice-title-input').value || '').trim();
    const body = (document.getElementById('notice-body-input').value || '').trim();
    const msg = document.getElementById('notice-post-msg');
    if (!title) { msg.textContent = 'タイトルを入力してください'; return; }
    const { error } = await appClient.from('notices').insert({ title: title, body: body || null });
    if (error) { msg.textContent = 'エラー: ' + error.message; return; }
    await loadAdminNotices();
    logAdminAction('post_notice', null, title);
    showToast('✅ 投稿しました');
  }

  async function moveNotice(id, currentOrder, direction) {
    const { data } = await appClient.from('notices').select('id,sort_order,created_at').order('sort_order', { ascending: true }).order('created_at', { ascending: true });
    if (!data) return;
    const idx = data.findIndex(function(n) { return n.id === id; });
    const swapIdx = idx + direction;
    if (swapIdx < 0 || swapIdx >= data.length) return;
    // 配列内で入れ替えてから、全件に連番を振り直す（同じsort_order値が並んでいても確実に反映されるようにする）
    const reordered = data.slice();
    const tmp = reordered[idx];
    reordered[idx] = reordered[swapIdx];
    reordered[swapIdx] = tmp;
    for (let i = 0; i < reordered.length; i++) {
      const r = await appClient.from('notices').update({ sort_order: i }).eq('id', reordered[i].id);
      if (r.error) { alert('並び替えエラー: ' + r.error.message); return; }
    }
    await loadAdminNotices();
  }

  async function toggleNoticeActive(id, current) {
    await appClient.from('notices').update({ is_active: !current }).eq('id', id);
    await loadAdminNotices();
    logAdminAction(current ? 'unpublish_notice' : 'publish_notice', id, null);
  }

  async function deleteNotice(id) {
    if (!confirm('このお知らせを削除しますか？')) return;
    await appClient.from('notices').delete().eq('id', id);
    await loadAdminNotices();
    logAdminAction('delete_notice', id, null);
    showToast('🗑️ 削除しました');
  }

  // ── スポット管理 ──
  async function loadAdminSpots() {
    const panel = document.getElementById('panel-spots');
    panel.innerHTML = '<div class="loading">読み込み中...</div>';
    try {
      const res = await fetch(`${APP_URL}/rest/v1/spots?select=id,name,category,member,admin_level&order=created_at.desc&limit=50`, {
        headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}` }
      });
      const data = await res.json();
      if (!Array.isArray(data)) throw new Error('取得失敗');
      panel.innerHTML = data.map(function(s) {
        return '<div class="item-card" style="display:flex;justify-content:space-between;align-items:center;">'
          + '<div><div class="item-title" style="margin-bottom:2px;">' + escHtml(s.name) + '</div>'
          + '<div class="item-meta" style="margin-bottom:0;">' + escHtml(s.category || '') + ' · ' + escHtml(s.member || '') + '</div></div>'
          + '<div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">'
          + '<span style="font-size:10px;padding:3px 8px;background:rgba(255,255,255,0.1);border-radius:20px;color:rgba(255,255,255,0.5);">' + escHtml(s.admin_level || '') + '</span>'
          + '<button onclick="deleteSpot(' + jsq(s.id) + ',' + jsq(s.name) + ')" style="background:rgba(220,38,38,0.2);border:none;color:#fca5a5;padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;">削除</button>'
          + '</div></div>';
      }).join('') || '<div class="empty">スポットがありません</div>';
    } catch (e) {
      console.warn('loadAdminSpots error:', e);
      panel.innerHTML = '<div class="err">読み込みエラー</div>';
    }
  }

  async function deleteSpot(id, name) {
    if (!confirm('「' + name + '」を削除しますか？')) return;
    await fetch(`${APP_URL}/rest/v1/spots?id=eq.${id}`, {
      method: 'DELETE',
      headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}` }
    });
    await loadAdminSpots();
    logAdminAction('delete_spot', id, name);
    showToast('🗑️ 削除しました');
  }

  // ── 管理者（モデレーター）管理 ──
  async function loadAdminList() {
    const panel = document.getElementById('panel-admins');
    panel.innerHTML = '<div class="loading">読み込み中...</div>';
    try {
      const { data, error } = await appClient.from('admins').select('*').order('created_at', { ascending: true });
      if (error) throw error;
      let html = '<div class="item-card">'
        + '<div style="font-size:13px;font-weight:700;margin-bottom:8px;">モデレーターを追加</div>'
        + '<input id="new-mod-username" placeholder="Xのユーザー名（例: @example）" style="width:100%;padding:10px;border-radius:8px;border:none;background:rgba(255,255,255,0.1);color:#fff;margin-bottom:8px;box-sizing:border-box;">'
        + '<button class="btn btn-approve" style="width:100%;" onclick="addModerator()">追加する</button>'
        + '<div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:8px;">追加後、本人が一度Xログインすると自動でuser_idが紐付きます（要: 別途ログイン紐付け処理）</div>'
        + '</div>';
      html += (data || []).map(function(a) {
        const isSuper = a.role === 'super_admin';
        return '<div class="item-card" style="display:flex;justify-content:space-between;align-items:center;">'
          + '<div><div class="item-title" style="margin-bottom:2px;">' + escHtml(a.username) + '</div>'
          + '<div class="item-meta" style="margin-bottom:0;">' + new Date(a.created_at).toLocaleDateString('ja-JP') + ' 登録</div></div>'
          + '<span style="font-size:12px;padding:4px 10px;border-radius:20px;font-weight:700;background:' + (isSuper ? 'linear-gradient(135deg,#c9a84c,#e8c96b)' : 'rgba(61,26,94,0.5)') + ';color:' + (isSuper ? '#1a0a2e' : '#c9a8e8') + ';">'
          + (isSuper ? '👑 super_admin' : '🛡️ moderator') + '</span></div>';
      }).join('');
      panel.innerHTML = html;
    } catch (e) {
      console.warn('loadAdminList error:', e);
      panel.innerHTML = '<div class="err">読み込みエラー（権限設定の見直しが必要です）</div>';
    }
  }

  async function addModerator() {
    const username = document.getElementById('new-mod-username').value.trim();
    if (!username) { alert('ユーザー名を入力してください'); return; }
    const { error } = await appClient.from('admins').insert({ username: username, role: 'moderator' });
    if (error) { alert('追加に失敗しました: ' + error.message); return; }
    document.getElementById('new-mod-username').value = '';
    await loadAdminList();
    logAdminAction('add_moderator', null, username);
    showToast('🛡️ ' + username + ' をモデレーターに追加しました');
  }

  // ── 開発者モード（自分のアカウントのみに適用） ──
  async function loadDevSettingsPanel() {
    const panel = document.getElementById('panel-devmode');
    panel.innerHTML = '<div class="loading">読み込み中...</div>';
    const { data: sessionData } = await appClient.auth.getSession();
    const uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
    if (!uid) { panel.innerHTML = '<div class="err">ログイン情報を取得できませんでした</div>'; return; }
    const { data } = await appClient.from('profiles').select('hide_from_ranking, dev_bypass_rank').eq('id', uid).maybeSingle();
    const hideOn = !!(data && data.hide_from_ranking);
    const bypassOn = !!(data && data.dev_bypass_rank);
    panel.innerHTML = '<div class="item-card">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.08);">'
      + '<div><div style="font-size:13px;font-weight:700;">ランキング非表示</div><div class="item-meta" style="margin-bottom:0;">達成率・推しファン・トップ貢献者バッジの集計から自分を除外</div></div>'
      + '<button id="dev-btn-hide" onclick="toggleDevSetting(\'hide_from_ranking\')" style="flex-shrink:0;padding:8px 16px;border:none;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;background:' + (hideOn ? 'linear-gradient(135deg,#3d1a5e,#6b2d8b)' : 'rgba(255,255,255,0.15)') + ';color:#fff;">' + (hideOn ? 'ON' : 'OFF') + '</button>'
      + '</div>'
      + '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;">'
      + '<div><div style="font-size:13px;font-weight:700;">ランク制限を無視</div><div class="item-meta" style="margin-bottom:0;">ルート最適化などランク限定機能を確認用に全解放</div></div>'
      + '<button id="dev-btn-bypass" onclick="toggleDevSetting(\'dev_bypass_rank\')" style="flex-shrink:0;padding:8px 16px;border:none;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;background:' + (bypassOn ? 'linear-gradient(135deg,#3d1a5e,#6b2d8b)' : 'rgba(255,255,255,0.15)') + ';color:#fff;">' + (bypassOn ? 'ON' : 'OFF') + '</button>'
      + '</div></div>';
  }

  async function toggleDevSetting(field) {
    const { data: sessionData } = await appClient.auth.getSession();
    const uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
    if (!uid) return;
    const { data } = await appClient.from('profiles').select(field).eq('id', uid).maybeSingle();
    const next = !(data && data[field]);
    const update = {};
    update[field] = next;
    await appClient.from('profiles').update(update).eq('id', uid);
    await loadDevSettingsPanel();
    showToast('✅ 設定を更新しました');
  }

  init();
</script>
