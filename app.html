<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace Series — 管理者ダッシュボード</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Hiragino Sans', 'Noto Sans JP', -apple-system, sans-serif;
    background: #0f0720;
    color: #fff;
    min-height: 100vh;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .back { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 13px; }
  .app-title { font-size: 15px; font-weight: 700; }
  .main { max-width: 720px; margin: 0 auto; padding: 20px 16px 60px; }

  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab-btn {
    flex: 1;
    padding: 10px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.6);
    border: none;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
  }
  .tab-btn.active {
    background: linear-gradient(135deg,#3d1a5e,#6b2d8b);
    color: #fff;
    font-weight: 700;
  }
  .badge {
    background: rgba(255,255,255,0.2);
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    margin-left: 4px;
  }

  .empty, .loading, .err {
    text-align: center;
    color: rgba(255,255,255,0.4);
    padding: 40px 20px;
    font-size: 13px;
  }
  .err { color: #f87171; }

  .item-card {
    background: rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .item-tag {
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .item-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .item-meta { font-size: 11px; color: rgba(255,255,255,0.45); margin-bottom: 8px; }
  .item-desc {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 8px;
  }
  .actions { display: flex; gap: 8px; margin-top: 10px; }
  .btn { flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-approve { background: linear-gradient(135deg,#15803d,#16a34a); color: #fff; }
  .btn-reject { background: rgba(220,38,38,0.3); color: #fca5a5; border: 1px solid rgba(220,38,38,0.4); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,10,35,0.95);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <a class="back" href="index.html">‹ 一覧へ</a>
  <div class="app-title" id="app-title">—</div>
  <div style="width:48px;"></div>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab-btn active" id="tab-pending" onclick="switchTab('pending')">
      承認待ち<span class="badge" id="pending-badge"></span>
    </button>
    <button class="tab-btn" id="tab-evals" onclick="switchTab('evals')">
      評価承認<span class="badge" id="evals-badge"></span>
    </button>
  </div>

  <div id="panel-pending"><div class="loading">読み込み中...</div></div>
  <div id="panel-evals" style="display:none;"><div class="loading">読み込み中...</div></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const appId = params.get('id');
  const appConfig = getAppConfig(appId);

  const authClient = supabase.createClient(AUTH_URL, AUTH_ANON_KEY);

  let APP_URL = '';
  let APP_KEY = '';

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2200);
  }

  function switchTab(tab) {
    ['pending', 'evals'].forEach(function(t) {
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
      document.getElementById('panel-' + t).style.display = t === tab ? 'block' : 'none';
    });
    if (tab === 'evals') loadPendingEvaluations();
  }

  // ── 認証・権限チェック ──
  async function init() {
    if (!appConfig) {
      document.body.innerHTML = '<div class="loading">不明なアプリです。<a class="back" href="index.html">一覧へ戻る</a></div>';
      return;
    }
    document.getElementById('app-title').textContent = appConfig.name;
    APP_URL = appConfig.supabase_url;
    APP_KEY = appConfig.supabase_anon_key;

    const { data } = await authClient.auth.getSession();
    if (!data || !data.session) {
      location.href = 'index.html';
      return;
    }
    const { data: adminRow, error } = await authClient
      .from('admins')
      .select('username, role')
      .eq('user_id', data.session.user.id)
      .maybeSingle();
    if (error || !adminRow) {
      location.href = 'index.html';
      return;
    }

    loadPendingSubmissions();
  }

  // ── 承認待ち（投稿） ──
  async function loadPendingSubmissions() {
    const panel = document.getElementById('panel-pending');
    panel.innerHTML = '<div class="loading">読み込み中...</div>';
    try {
      const res = await fetch(`${APP_URL}/rest/v1/submissions?status=eq.pending&order=created_at.desc`, {
        headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}` }
      });
      const data = await res.json();
      if (!Array.isArray(data)) {
        panel.innerHTML = '<div class="err">読み込みエラー</div>';
        return;
      }
      document.getElementById('pending-badge').textContent = data.length || '';
      if (!data.length) {
        panel.innerHTML = '<div class="empty">承認待ちの投稿はありません</div>';
        return;
      }
      const gMapUrl = function(lat, lng) { return 'https://www.google.com/maps?q=' + lat + ',' + lng; };

      panel.innerHTML = data.map(function(s) {
        if (s.type === 'wrong_report') {
          return '<div class="item-card" style="border-color:rgba(239,68,68,0.35);background:rgba(239,68,68,0.1);">'
            + '<div class="item-tag" style="color:#dc2626;">🛡️ 誤情報報告</div>'
            + '<div class="item-title">' + escHtml(s.spot_name) + '</div>'
            + '<div class="item-desc">' + escHtml(s.description || '(内容未記入)') + '</div>'
            + '<div class="item-meta">報告者: ' + escHtml(s.submitter || '匿名') + '</div>'
            + '<div class="actions">'
            + '<button class="btn btn-approve" onclick="approveWrongReport(' + JSON.stringify(s.id) + ')">✅ 確定</button>'
            + '<button class="btn btn-reject" onclick="rejectSubmission(' + JSON.stringify(s.id) + ')">❌ 却下</button>'
            + '</div></div>';
        }
        if (s.type === 'location_correction') {
          return '<div class="item-card" style="border-color:rgba(201,168,76,0.35);background:rgba(201,168,76,0.1);">'
            + '<div class="item-tag" style="color:#c9a84c;">📍 位置修正リクエスト</div>'
            + '<div class="item-title">' + escHtml(s.target_spot_name || s.spot_name) + '</div>'
            + '<div class="item-meta">報告座標: ' + s.lat.toFixed(4) + ', ' + s.lng.toFixed(4) + '　<a href="' + gMapUrl(s.lat, s.lng) + '" target="_blank" style="color:#c9a84c;">🗺️ 確認</a></div>'
            + '<div class="actions">'
            + '<button class="btn btn-approve" onclick="approveLocationCorrection(' + JSON.stringify(s.id) + ')">✅ 位置を更新</button>'
            + '<button class="btn btn-reject" onclick="rejectSubmission(' + JSON.stringify(s.id) + ')">❌ 却下</button>'
            + '</div></div>';
        }
        return '<div class="item-card">'
          + '<div class="item-title">' + escHtml(s.spot_name) + (s.location_confirmed === false ? ' <span style="font-size:10px;background:rgba(245,158,11,0.25);color:#fbbf24;border-radius:8px;padding:2px 8px;">⚠️ 位置未確認</span>' : '') + '</div>'
          + '<div class="item-meta">' + escHtml(s.category || '') + ' · ' + escHtml(s.member || '') + ' · ' + escHtml(s.submitter || '') + '</div>'
          + (s.image_url ? '<img src="' + s.image_url + '" style="width:100%;max-width:200px;border-radius:10px;margin-bottom:8px;display:block;">' : '')
          + (s.description ? '<div class="item-desc">' + escHtml(s.description) + '</div>' : '')
          + '<div class="actions">'
          + '<button class="btn btn-approve" onclick="approveNewSpot(' + JSON.stringify(s.id) + ')">✅ 承認</button>'
          + '<button class="btn btn-reject" onclick="rejectSubmission(' + JSON.stringify(s.id) + ')">❌ 却下</button>'
          + '</div></div>';
      }).join('');
    } catch (e) {
      console.warn('loadPendingSubmissions error:', e);
      panel.innerHTML = '<div class="err">読み込みエラー</div>';
    }
  }

  async function awardPointsViaFetch(userId, amount) {
    if (!userId || !amount) return;
    try {
      const res = await fetch(`${APP_URL}/rest/v1/profiles?id=eq.${userId}&select=points`, {
        headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}` }
      });
      const rows = await res.json();
      const current = (rows && rows[0] && rows[0].points) || 0;
      await fetch(`${APP_URL}/rest/v1/profiles?id=eq.${userId}`, {
        method: 'PATCH',
        headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ points: current + amount })
      });
    } catch (e) { console.warn('awardPointsViaFetch error:', e); }
  }

  async function patchSubmission(id, body) {
    await fetch(`${APP_URL}/rest/v1/submissions?id=eq.${id}`, {
      method: 'PATCH',
      headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  }

  async function insertPointLog(body) {
    await fetch(`${APP_URL}/rest/v1/point_log`, {
      method: 'POST',
      headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(Object.assign({ created_at: new Date().toISOString() }, body))
    });
  }

  async function approveNewSpot(id) {
    const res = await fetch(`${APP_URL}/rest/v1/submissions?id=eq.${id}`, {
      headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}` }
    });
    const [s] = await res.json();
    if (!s) return;

    await fetch(`${APP_URL}/rest/v1/spots`, {
      method: 'POST',
      headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: s.spot_name, lat: s.lat, lng: s.lng, sub: s.description, icon: '📍',
        category: s.category, address: '', member: s.member, image_url: s.image_url || null,
        discoverer: s.submitter, trust_score: 5, good_count: 0, bad_count: 0, admin_level: 'pending_review',
      })
    });
    await patchSubmission(id, { status: 'approved' });

    if (s.submitter_id) {
      await insertPointLog({ user_id: s.submitter_id, category: '早期発見', amount: 50, spot_name: s.spot_name, status: 'confirmed' });
      await awardPointsViaFetch(s.submitter_id, 50);
      if (s.image_url) {
        await insertPointLog({ user_id: s.submitter_id, category: '元ネタ写真提供', amount: 30, spot_name: s.spot_name, status: 'confirmed' });
        await awardPointsViaFetch(s.submitter_id, 30);
      }
    }
    await loadPendingSubmissions();
    showToast('✅ 承認しました');
  }

  async function approveLocationCorrection(id) {
    const res = await fetch(`${APP_URL}/rest/v1/submissions?id=eq.${id}`, {
      headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}` }
    });
    const [s] = await res.json();
    if (!s) return;

    await fetch(`${APP_URL}/rest/v1/spots?name=eq.${encodeURIComponent(s.target_spot_name)}`, {
      method: 'PATCH',
      headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ lat: s.lat, lng: s.lng })
    });
    await patchSubmission(id, { status: 'approved' });

    if (s.submitter_id) {
      await insertPointLog({ user_id: s.submitter_id, category: 'wrong_info_confirmed', amount: 10, spot_name: s.spot_name, status: 'confirmed' });
      await awardPointsViaFetch(s.submitter_id, 10);
    }
    await loadPendingSubmissions();
    showToast('✅ 位置を更新しました');
  }

  async function approveWrongReport(id) {
    const res = await fetch(`${APP_URL}/rest/v1/submissions?id=eq.${id}`, {
      headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}` }
    });
    const [s] = await res.json();
    if (!s) return;

    if (s.submitter_id) {
      await insertPointLog({ user_id: s.submitter_id, category: 'wrong_info_confirmed', amount: 10, spot_name: s.spot_name, status: 'confirmed' });
      await awardPointsViaFetch(s.submitter_id, 10);
    }
    await patchSubmission(id, { status: 'approved' });
    await loadPendingSubmissions();
    showToast('✅ 確定しました');
  }

  async function rejectSubmission(id) {
    await patchSubmission(id, { status: 'rejected' });
    await loadPendingSubmissions();
    showToast('❌ 却下しました');
  }

  // ── 評価承認（リモート確認・BAD評価） ──
  async function loadPendingEvaluations() {
    const panel = document.getElementById('panel-evals');
    panel.innerHTML = '<div class="loading">読み込み中...</div>';
    try {
      const res = await fetch(`${APP_URL}/rest/v1/point_log?status=eq.pending&order=created_at.asc&select=*`, {
        headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}` }
      });
      const rows = await res.json();
      document.getElementById('evals-badge').textContent = (rows || []).length || '';
      if (!rows || !rows.length) {
        panel.innerHTML = '<div class="empty">承認待ちの評価はありません</div>';
        return;
      }
      const uids = [...new Set(rows.map(function(r) { return r.user_id; }).filter(Boolean))];
      let nameMap = {};
      if (uids.length > 0) {
        const pRes = await fetch(`${APP_URL}/rest/v1/profiles?id=in.(${uids.join(',')})&select=id,display_name`, {
          headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}` }
        });
        const pRows = await pRes.json();
        (pRows || []).forEach(function(p) { nameMap[p.id] = p.display_name; });
      }
      panel.innerHTML = rows.map(function(r) {
        const dt = new Date(r.created_at).toLocaleDateString('ja-JP');
        const uname = nameMap[r.user_id] || '巡礼者';
        return '<div class="item-card">'
          + '<div class="item-title">' + escHtml(uname) + ' さん</div>'
          + '<div class="item-meta">📍 ' + escHtml(r.spot_name || '') + '</div>'
          + '<div class="item-meta">' + escHtml(r.category || '') + '　<span style="color:#4ade80;font-weight:700;">+' + r.amount + 'pt</span>　' + dt + '</div>'
          + '<div class="actions">'
          + '<button class="btn btn-approve" onclick="approveEvalPoint(' + JSON.stringify(r.id) + ',' + JSON.stringify(r.user_id) + ',' + r.amount + ')">✅ 承認</button>'
          + '<button class="btn btn-reject" onclick="rejectEvalPoint(' + JSON.stringify(r.id) + ')">❌ 却下</button>'
          + '</div></div>';
      }).join('');
    } catch (e) {
      console.warn('loadPendingEvaluations error:', e);
      panel.innerHTML = '<div class="err">読み込みエラー</div>';
    }
  }

  async function approveEvalPoint(id, userId, amount) {
    await fetch(`${APP_URL}/rest/v1/point_log?id=eq.${id}`, {
      method: 'PATCH',
      headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'confirmed' })
    });
    await awardPointsViaFetch(userId, amount);
    await loadPendingEvaluations();
    showToast('✅ 承認してポイントを付与しました');
  }

  async function rejectEvalPoint(id) {
    await fetch(`${APP_URL}/rest/v1/point_log?id=eq.${id}`, {
      method: 'PATCH',
      headers: { 'apikey': APP_KEY, 'Authorization': `Bearer ${APP_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'rejected' })
    });
    await loadPendingEvaluations();
    showToast('❌ 却下しました');
  }

  init();
</script>

</body>
</html>
